# ============================================================
# LogDrain — Docker Compose (Initial)
# Phase 2: Log generator only
# Runs the containerised log generator with a persistent volume
# ============================================================

services:
  log-generator:
    build: .
    container_name: logdrain-generator
    volumes:
      - log-data:/app/logs
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    ports:
      - '3100:3100'
    volumes:
      - ./config/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki

  promtail:
    image: grafana/promtail:2.9.0
    ports:
      - '9080:9080'
    volumes:
      - './config/promtail-config.yml:/etc/promtail/promtail-config.yml'
      - log-data:/app/logs
    depends_on:
      - loki
  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - '3000:3000'
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  log-data:
  grafana-data:
  loki-data:
